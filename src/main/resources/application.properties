# Application
spring.application.name=notification-system
server.port=8081

# Actuator (health check for containers)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# H2 Database
spring.datasource.url=jdbc:h2:mem:notificationdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Scheduling
spring.task.scheduling.pool.size=5

# Retry Configuration
notification.retry.max-attempts=3
notification.retry.initial-delay-ms=1000
notification.retry.multiplier=2.0

# Batch Configuration
notification.batch.size=100

# Async Thread Pool Configuration
notification.async.core-pool-size=10
notification.async.max-pool-size=50
notification.async.queue-capacity=10000

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
notification.kafka.topic.send=notification-send
notification.kafka.topic.retry=notification-retry
notification.kafka.consumer.group-id=notification-group
notification.kafka.consumer.concurrency=3

# ============ Redis Configuration ============
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ============ Spring Cache (backed by Redis) ============
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.key-prefix=notif:
spring.cache.redis.use-key-prefix=true

# ============ Deduplication & Rate Limiting ============
# TTL for Kafka event deduplication (at-least-once redelivery protection)
notification.dedup.ttl-seconds=300
# TTL for content-based deduplication (same payload submitted twice by a client)
# 60 seconds: a second identical API request within 1 minute is rejected as a duplicate
notification.dedup.content-ttl-seconds=60
notification.ratelimit.email.max-per-minute=50
notification.ratelimit.sms.max-per-minute=20
notification.ratelimit.push.max-per-minute=100

# ============ Jackson Configuration ============
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.mapper.accept-case-insensitive-properties=true
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
