# Test Configuration - Disable external dependencies

# Use in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Redis for tests (use simple cache)
spring.cache.type=simple

# Disable Kafka for tests
spring.kafka.consumer.auto-startup=false

# Reduce thread pools for tests
notification.async.core-pool-size=2
notification.async.max-pool-size=5
notification.async.queue-capacity=100

# Scheduling
spring.task.scheduling.pool.size=2
