# Base test configuration
spring.application.name=notification-system
server.port=8081

# Actuator (health check for containers)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# H2 Database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Scheduling
spring.task.scheduling.pool.size=2

# Retry Configuration
notification.retry.max-attempts=3
notification.retry.initial-delay-ms=100
notification.retry.multiplier=2.0

# Batch Configuration
notification.batch.size=100

# Async Thread Pool Configuration (reduced for tests)
notification.async.core-pool-size=2
notification.async.max-pool-size=5
notification.async.queue-capacity=100

# Kafka Configuration (disabled for tests)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-startup=false
notification.kafka.topic.send=notification-send
notification.kafka.topic.retry=notification-retry
notification.kafka.consumer.group-id=notification-group
notification.kafka.consumer.concurrency=1

# Redis Configuration (disabled for tests - use simple cache)
spring.cache.type=simple

# Deduplication & Rate Limiting
notification.dedup.ttl-seconds=300
notification.ratelimit.email.max-per-minute=50
notification.ratelimit.sms.max-per-minute=20
notification.ratelimit.push.max-per-minute=100
